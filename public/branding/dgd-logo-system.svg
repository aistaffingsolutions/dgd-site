<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .d-letters { fill: var(--d-color, #FFFFFF); }
    .g-shield { fill: var(--g-color, #2563EB); stroke: var(--g-color, #2563EB); }
