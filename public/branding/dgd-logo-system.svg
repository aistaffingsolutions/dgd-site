<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .d-letters { fill: var(--d-color, #FFFFFF); }
    .g-letter  { fill: var(--g-color, #2563EB); }
    .shield    { fill: none; stroke: var(--g-color, #2563EB); stroke-width: 18; }
  </style>

  <!-- Shield — stroke only, no fill -->
  <path class="shield"
        d="M256 40L430 110V250C430 360 356 440 256 472C156 440 82 360 82 250V110L256 40Z"/>

  <!-- Left D -->
  <text x="120" y="305"
        class="d-letters"
        font-family="Arial, Helvetica, sans-serif"
        font-size="150"
        font-weight="700">d</text>

  <!-- G -->
  <text x="195" y="340"
        class="g-letter"
        font-family="Arial, Helvetica, sans-serif"
        font-size="180"
        font-weight="700">g</text>

  <!-- Right D -->
  <text x="315" y="305"
        class="d-letters"
        font-family="Arial, Helvetica, sans-serif"
        font-size="150"
        font-weight="700">d</text>
</svg>
